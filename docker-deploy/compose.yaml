services:
  homepage:
    build: .
    container_name: vincent-homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:8066:8066"
    environment:
      - BLOG_TOKEN=${BLOG_TOKEN:?Create .env and set BLOG_TOKEN}
      - BLOG_DB_PATH=/data/blog.db
    volumes:
      - ./data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8066/api/published', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
