<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="博客编辑器 — 撰写和管理技术文章" />
    <title>博客管理 | Vincent</title>
    <link rel="stylesheet" href="/src/styles.css" />

    <!-- marked.js — 本地副本，避免 CDN 被墙 -->
    <script src="/static/marked.min.js"></script>

    <style>
      /* ── 编辑区专用样式 ── */
      .editor-textarea {
        background: transparent;
        color: #f7f7f3;
        font-family: 'JetBrains Mono', 'Consolas', monospace;
        font-size: 14px;
        line-height: 1.8;
        border: none;
        outline: none;
        resize: none;
        width: 100%;
        min-height: 520px;
      }
      .editor-textarea::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }
      .editor-textarea:focus {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      }

      .editor-title {
        background: transparent;
        color: #f7f7f3;
        font-family: inherit;
        font-size: clamp(22px, 3vw, 30px);
        font-weight: 700;
        border: none;
        outline: none;
        width: 100%;
        margin-bottom: 16px;
      }
      .editor-title::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      /* 预览区 prose */
      .preview-content {
        color: rgba(0, 0, 0, 0.78);
        line-height: 1.96;
      }
      .preview-content h1 { font-size: clamp(28px, 4vw, 40px); margin: 1em 0 0.5em; font-weight: 860; letter-spacing: -0.5px; }
      .preview-content h2 { font-size: clamp(22px, 3vw, 30px); margin: 1em 0 0.5em; font-weight: 860; }
      .preview-content h3 { font-size: clamp(18px, 2vw, 24px); margin: 0.8em 0 0.4em; }
      .preview-content p { margin: 0.8em 0; }
      .preview-content ul, .preview-content ol { padding-left: 1.5em; }
      .preview-content li { margin: 0.3em 0; }
      .preview-content code {
        font-family: 'JetBrains Mono', 'Consolas', monospace;
        background: rgba(0, 0, 0, 0.06);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.9em;
      }
      .preview-content pre {
        background: #050505;
        color: #f7f7f3;
        padding: 20px;
        overflow-x: auto;
      }
      .preview-content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
        font-size: 13px;
      }
      .preview-content img { max-width: 100%; }
      .preview-content blockquote {
        border-left: 2px solid rgba(0, 0, 0, 0.2);
        padding-left: 16px;
        color: rgba(0, 0, 0, 0.5);
        margin-left: 0;
      }
      .preview-content a { color: #050505; text-decoration: underline; }
      .preview-content table { border-collapse: collapse; width: 100%; margin: 1em 0; }
      .preview-content th, .preview-content td { border: 1px solid rgba(0,0,0,0.14); padding: 8px 12px; text-align: left; }
      .preview-content th { background: rgba(0,0,0,0.04); font-weight: 600; }

      /* 文章列表项选中态 */
      .index-row[data-selected="true"] {
        background: #050505;
        color: #f7f7f3;
      }
      .index-row[data-selected="true"] .row-kind,
      .index-row[data-selected="true"] .row-main small {
        color: rgba(255, 255, 255, 0.6);
      }

      /* 标签按钮 */
      .tag-row span,
      .tag-row button {
        cursor: pointer;
        user-select: none;
        transition: background 150ms ease;
      }
      .tag-row [data-active="true"] {
        background: #050505 !important;
        color: #f7f7f3 !important;
        border-color: #050505 !important;
      }

      /* 编辑器标签输入 */
      .editor-tags-input {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: #f7f7f3;
        padding: 5px 8px;
        font: inherit;
        font-size: 12px;
        width: 100%;
        outline: none;
      }
      .editor-tags-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
      }

      /* 编辑区面板容器 */
      .editor-panel[data-visible="false"] {
        display: none;
      }

      /* 编辑区左右布局 */
      .editor-layout {
        display: grid;
        grid-template-columns: minmax(240px, 300px) minmax(0, 1fr);
        gap: 28px;
        align-items: flex-start;
        padding-top: 20px;
      }
      .editor-sidebar {
        position: sticky;
        top: 94px;
        max-height: calc(100vh - 120px);
        overflow: auto;
      }
      .editor-main {
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(0, 1.03fr) minmax(320px, 0.97fr);
        gap: 18px;
        align-items: start;
      }
      .editor-main > .footer-links {
        grid-column: 1 / -1;
        position: sticky;
        bottom: 16px;
        z-index: 5;
        width: fit-content;
        max-width: 100%;
        padding: 8px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background:
          linear-gradient(135deg, rgba(255,255,255,0.62), rgba(255,255,255,0.34)),
          rgba(255,255,255,0.28);
        backdrop-filter: blur(18px) saturate(1.16);
        box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      }
      #panel-preview .article-glass {
        margin-top: 0 !important;
        min-height: 650px;
      }
      #panel-edit .black-feature-card {
        min-height: 650px !important;
      }

      /* 删除按钮 */
      .btn-delete {
        color: rgba(0, 0, 0, 0.38);
        border-color: rgba(0, 0, 0, 0.1);
      }
      .btn-delete:hover {
        color: #c00;
        border-color: rgba(200, 0, 0, 0.3);
      }

      /* 移动端 Tab 切换 */
      .editor-tabs {
        display: none;
      }

      @media (max-width: 980px) {
        .editor-layout {
          display: block;
          gap: 20px;
        }
        .editor-sidebar {
          position: static;
          max-height: none;
          width: 100%;
          margin-bottom: 24px;
        }
        .editor-main {
          display: block;
        }
        .editor-tabs {
          display: flex;
          gap: 0;
          margin-bottom: 16px;
        }
        .editor-tabs button {
          flex: 1;
          padding: 10px;
          border: 1px solid rgba(0, 0, 0, 0.14);
          background: rgba(255, 255, 255, 0.5);
          font: inherit;
          font-size: 14px;
          cursor: pointer;
          transition: background 150ms ease;
        }
        .editor-tabs button[data-active="true"] {
          background: #050505;
          color: #f7f7f3;
        }
        .editor-textarea {
          min-height: 300px;
        }
        #panel-preview .article-glass,
        #panel-edit .black-feature-card {
          min-height: auto !important;
        }
        .editor-main > .footer-links {
          position: static;
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="site-shell">
      <div class="grid-field" aria-hidden="true">
        <div class="grid-ray"></div>
      </div>

      <header class="site-header">
        <a class="brand" href="/" aria-label="回到首页">
          <span class="brand-mark">V</span>
          <span>
            <strong>Vincent</strong>
            <small>博客管理</small>
          </span>
        </a>

        <a class="command-toggle" href="/" style="text-decoration:none;display:flex;min-width:112px;height:42px;align-items:center;justify-content:space-between;gap:14px;border:1px solid rgba(0,0,0,0.86);background:#050505;color:#f7f7f3;padding:0 13px;cursor:pointer;font:inherit">
          <span>← 主页</span>
          <span class="toggle-line" style="width:24px;height:1px;background:currentColor"></span>
        </a>
      </header>

      <main>
        <section class="section-block" style="padding-bottom:20px">
          <p class="eyebrow">BLOG EDITOR</p>
          <h2>博客管理</h2>
        </section>

        <!-- 标签筛选 -->
        <div class="section-block" style="padding-top:0;padding-bottom:0">
          <div class="tag-row" id="tag-filter">
            <span data-active="true" data-tag="">全部</span>
          </div>
        </div>

        <div class="section-block editor-layout">

          <!-- 左侧：文章列表 -->
          <div class="editor-sidebar" id="post-list-panel">
            <div class="index-list" id="post-list">
              <div style="padding:20px;color:rgba(0,0,0,0.42);text-align:center">加载中...</div>
            </div>
            <div style="margin-top:14px">
              <button class="command-toggle" type="button" id="btn-new" style="width:100%;justify-content:center;font:inherit">
                + 新建文章
              </button>
            </div>
          </div>

          <!-- 右侧：编辑区 + 预览区 -->
          <div class="editor-main" id="editor-panel">

            <!-- 移动端 Tab -->
            <div class="editor-tabs" id="editor-tabs">
              <button data-tab="edit" data-active="true">编辑</button>
              <button data-tab="preview">预览</button>
            </div>

            <!-- 编辑区 -->
            <div class="editor-panel" data-visible="true" id="panel-edit">
              <article class="black-feature-card" style="min-height:auto">
                <div class="card-kicker" id="editor-kicker">新建文章</div>
                <input
                  type="text"
                  class="editor-title"
                  id="editor-title"
                  placeholder="文章标题..."
                />
                <textarea
                  class="editor-textarea"
                  id="editor-textarea"
                  placeholder="Markdown 正文..."
                ></textarea>
                <div class="tag-row" style="margin-top:16px">
                  <input
                    type="text"
                    class="editor-tags-input"
                    id="editor-tags"
                    placeholder="标签，逗号分隔"
                  />
                </div>
              </article>
            </div>

            <!-- 预览区 -->
            <div class="editor-panel" data-visible="true" id="panel-preview">
              <article class="article-glass" style="margin-top:18px">
                <p class="eyebrow">PREVIEW</p>
                <div class="preview-content" id="preview-content">
                  <p style="color:rgba(0,0,0,0.42)">预览将在这里实时显示...</p>
                </div>
              </article>
            </div>

            <!-- 操作按钮 -->
            <div class="footer-links" style="margin-top:20px">
              <a href="#" id="btn-save-draft">保存草稿</a>
              <a href="#" id="btn-publish" style="background:#050505;color:#f7f7f3;border-color:#050505">发布</a>
              <a href="#" id="btn-delete" class="btn-delete">删除</a>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/static/editor.js"></script>
  </body>
</html>
